artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
expert_time_estimate_hours = 0.3
difficulty_explanation = "Parse a small access log and emit summary statistics as JSON."
solution_explanation = "Read the access log, count non-empty requests and unique client IPs, determine the most frequently requested path, and write the results to /app/report.json."
verification_explanation = "Parse /app/report.json as JSON and verify the exact expected request count, unique IP count, and most frequently requested path."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

